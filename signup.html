<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Habesha Cuts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;">
                <h1>Habesha<span>Cuts</span></h1>
            </a>
        </div>
        <div class="nav-links">
            <a href="for-barbers.html" class="nav-item">Back to Features</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Join the Directory</h2>
            <p>Create your free barber account to start getting booked.</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="barber@shop.com" required>
                </div>
                
                <div class="form-group">
                    <label for="signup-password">Create Password</label>
                    <input type="password" id="signup-password" placeholder="At least 6 characters" required>
                </div>
                
                <button type="submit" class="btn-primary auth-btn">Create Account</button>
            </form>
            
            <div class="auth-toggle">
                <p>Already have an account? <a href="login.html" style="color: var(--gold); font-weight: 600;">Log in here</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
