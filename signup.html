<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Habesha Cuts</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;">
                <h1>Habesha<span>Cuts</span></h1>
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 500px;">
            <h2>Register Your Shop</h2>
            <p>Complete your profile to join the Habesha Cuts directory.</p>

            <form id="signup-form">
                <!-- FIXED: Using form-row class instead of inline flex styles -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signup-email" required>
                    </div>
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" id="signup-password" minlength="6" required>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="e.g. Dawit M." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Barbershop Name</label>
                        <input type="text" id="signup-shop" required>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="signup-city" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="signup-phone" placeholder="(555) 123-4567" required>
                </div>

                <div class="form-group">
                    <label>Calendly Booking Link</label>
                    <input type="url" id="signup-calendly" placeholder="https://calendly.com/your-username">
                    <small style="color: var(--text-light); font-size: 11px;">You can add this later if you don't have one yet.</small>
                </div>

                <button type="submit" class="btn-primary auth-btn">Complete Registration</button>
            </form>

            <div class="auth-toggle">
                <p>Already have an account? <a href="login.html" style="color: var(--gold); font-weight: 600;">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
