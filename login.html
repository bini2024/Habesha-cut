<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Habesha Cuts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;">
                <h1>Habesha<span>Cuts</span></h1>
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Find a Barber</a>
            <a href="for-barbers.html" class="nav-item">For Barbers</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Log in to manage your schedule and clients.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="barber@shop.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary auth-btn">Log In</button>
            </form>
            
            <div class="auth-toggle">
                <p>New to Habesha Cuts? <a href="#" style="color: var(--gold); font-weight: 600;">Create an account</a></p>
            </div>
        </div>
    </div>
<script type="module" src="app.js"></script>
</body>
</html>
